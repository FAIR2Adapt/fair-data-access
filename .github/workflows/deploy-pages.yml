name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'examples/walkthrough/**'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MyST-MD
        run: npm install -g mystmd

      - name: Install Python dependencies (for walkthrough)
        run: |
          pip install -e .
          pip install jupytext pandas

      - name: Build main docs site
        working-directory: docs
        env:
          BASE_URL: /fair-data-access
        run: myst build --html

      - name: Build walkthrough
        working-directory: examples/walkthrough
        run: |
          # Convert .py to .ipynb (not executed — no private keys in Pages deploy)
          for nb in 00_setup_did 01_provider 02_consumer; do
            jupytext --to notebook "${nb}.py"
          done
          myst build --html

      - name: Copy static files (DID documents, keys)
        run: |
          cp docs/did.json docs/_build/html/did.json
          # Copy example consumer DID for walkthrough
          if [ -d docs/example-consumer ]; then
            mkdir -p docs/_build/html/example-consumer
            cp docs/example-consumer/did.json docs/_build/html/example-consumer/did.json
          fi
          # Copy any existing wrapped keys
          if [ -d docs/keys ]; then
            cp -r docs/keys docs/_build/html/keys
          fi

      - name: Copy walkthrough book into Pages site
        run: |
          mkdir -p docs/_build/html/walkthrough
          cp -r examples/walkthrough/_build/html/* docs/_build/html/walkthrough/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
