name: Process Data Access Request

on:
  issues:
    types: [opened, labeled]

jobs:
  evaluate:
    if: contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Parse access request
        id: parse
        run: python scripts/parse_request.py "${{ github.event.issue.body }}"

      - name: Resolve DID and get public key
        id: resolve
        run: python scripts/resolve_did_action.py ${{ steps.parse.outputs.did }}

      - name: Verify ODRL Access Grant
        id: evaluate
        run: |
          python scripts/evaluate_policy_action.py \
            --dataset "${{ steps.parse.outputs.dataset }}" \
            --did "${{ steps.parse.outputs.did }}" \
            --purpose "${{ steps.parse.outputs.purpose }}"

      - name: Wrap key and publish
        if: steps.evaluate.outputs.decision == 'permit'
        id: wrap
        run: |
          python scripts/wrap_key_action.py \
            --dataset "${{ steps.parse.outputs.dataset }}" \
            --did "${{ steps.parse.outputs.did }}" \
            --public-key-pem "${{ steps.resolve.outputs.public_key_pem_b64 }}"
        env:
          DATASET_KEY: ${{ secrets[format('KEY_{0}', steps.parse.outputs.dataset_secret_name)] }}

      - name: Deploy wrapped key to GitHub Pages
        if: steps.evaluate.outputs.decision == 'permit'
        run: |
          # The wrapped key is already at the right path from wrap_key_action.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.wrap.outputs.wrapped_key_path }}"
          git commit -m "Grant access: ${{ steps.parse.outputs.dataset }} → ${{ steps.parse.outputs.did }}"
          git push

      - name: Comment on issue (approved)
        if: steps.evaluate.outputs.decision == 'permit'
        run: |
          DID_HASH=$(echo -n "${{ steps.parse.outputs.did }}" | sha256sum | cut -d' ' -f1)
          DATASET="${{ steps.parse.outputs.dataset }}"
          PAGES_URL="https://fair2adapt.github.io/fair-data-access"

          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<EOF
          ## Access Granted

          A valid [ODRL Access Grant for FAIR Data](${{ steps.evaluate.outputs.grant_nanopub_uri }}) was found and verified:
          - **Signature:** valid
          - **Authorized by:** policy publisher (creator match verified)

          **Wrapped key URL:**
          \`${PAGES_URL}/keys/${DID_HASH}/${DATASET}.key\`

          **How to decrypt:**
          \`\`\`bash
          curl -o wrapped_key.json "${PAGES_URL}/keys/${DID_HASH}/${DATASET}.key"

          fair-data-access decrypt ${DATASET}.gpkg.enc \\
            --wrapped-key wrapped_key.json \\
            --private-key your_private_key.pem
          \`\`\`

          **Policy:** [${{ steps.evaluate.outputs.policy_nanopub_uri }}](${{ steps.evaluate.outputs.policy_nanopub_uri }})
          **Grant:** [${{ steps.evaluate.outputs.grant_nanopub_uri }}](${{ steps.evaluate.outputs.grant_nanopub_uri }})
          EOF
          )"
          gh issue close ${{ github.event.issue.number }} --reason completed
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment on issue (denied)
        if: steps.evaluate.outputs.decision == 'deny'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<EOF
          ## Access Denied

          No valid ODRL Access Grant for FAIR Data was found for your request.

          **Reason:** ${{ steps.evaluate.outputs.reason }}

          **Next steps:**
          1. Contact the data provider to request access
          2. The provider will review your request and publish an ODRL Access Grant via [Nanodash](https://nanodash.knowledgepixels.com/publish?template=https://w3id.org/np/RAeRMv6jOibLPIYBMOGu_FsX6NQ6B59KJCgCFkue4z7Ac)
          3. Once the grant is published, re-open this issue or create a new one

          **Policy:** [${{ steps.evaluate.outputs.policy_nanopub_uri }}](${{ steps.evaluate.outputs.policy_nanopub_uri }})
          EOF
          )"
          gh issue close ${{ github.event.issue.number }} --reason "not planned"
        env:
          GH_TOKEN: ${{ github.token }}
