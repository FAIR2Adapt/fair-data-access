name: Process Data Access Request

on:
  issues:
    types: [opened]

jobs:
  evaluate:
    if: contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Parse access request
        id: parse
        run: python scripts/parse_request.py "${{ github.event.issue.body }}"

      - name: Resolve DID and get public key
        id: resolve
        run: python scripts/resolve_did_action.py ${{ steps.parse.outputs.did }}

      - name: Evaluate ODRL policy
        id: evaluate
        run: |
          python scripts/evaluate_policy_action.py \
            --dataset "${{ steps.parse.outputs.dataset }}" \
            --did "${{ steps.parse.outputs.did }}" \
            --purpose "${{ steps.parse.outputs.purpose }}"

      - name: Wrap key and publish
        if: steps.evaluate.outputs.decision == 'permit'
        id: wrap
        run: |
          python scripts/wrap_key_action.py \
            --dataset "${{ steps.parse.outputs.dataset }}" \
            --did "${{ steps.parse.outputs.did }}" \
            --public-key-pem "${{ steps.resolve.outputs.public_key_pem_b64 }}"
        env:
          # Each dataset has its symmetric key stored as a GitHub Secret
          # Named like: KEY_HAMBURG_BUILDINGS (dataset id uppercased, hyphens→underscores)
          DATASET_KEY: ${{ secrets[format('KEY_{0}', steps.parse.outputs.dataset_secret_name)] }}

      - name: Publish access grant nanopub
        if: steps.evaluate.outputs.decision == 'permit'
        run: |
          python scripts/publish_grant.py \
            --dataset "${{ steps.parse.outputs.dataset }}" \
            --did "${{ steps.parse.outputs.did }}" \
            --policy-nanopub "${{ steps.evaluate.outputs.policy_nanopub_uri }}" \
            --workflow-run "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          NANOPUB_PRIVATE_KEY: ${{ secrets.NANOPUB_PRIVATE_KEY }}

      - name: Deploy wrapped key to GitHub Pages
        if: steps.evaluate.outputs.decision == 'permit'
        run: |
          # Copy wrapped key to gh-pages directory
          DID_HASH=$(echo -n "${{ steps.parse.outputs.did }}" | sha256sum | cut -d' ' -f1)
          DATASET="${{ steps.parse.outputs.dataset }}"
          mkdir -p docs/keys/${DID_HASH}
          cp "${{ steps.wrap.outputs.wrapped_key_path }}" "docs/keys/${DID_HASH}/${DATASET}.key"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "docs/keys/${DID_HASH}/${DATASET}.key"
          git commit -m "Grant access: ${DATASET} → ${{ steps.parse.outputs.did }}"
          git push

      - name: Comment on issue (approved)
        if: steps.evaluate.outputs.decision == 'permit'
        run: |
          DID_HASH=$(echo -n "${{ steps.parse.outputs.did }}" | sha256sum | cut -d' ' -f1)
          DATASET="${{ steps.parse.outputs.dataset }}"
          PAGES_URL="https://fair2adapt.github.io/fair-data-access"

          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<EOF
          ## Access Granted

          Your request has been evaluated against the dataset's ODRL policy and **approved**.

          **Wrapped key URL:**
          \`${PAGES_URL}/keys/${DID_HASH}/${DATASET}.key\`

          **How to decrypt:**
          \`\`\`bash
          # Download the wrapped key
          curl -o wrapped_key.json "${PAGES_URL}/keys/${DID_HASH}/${DATASET}.key"

          # Decrypt with your DID private key
          fair-data-access decrypt ${DATASET}.gpkg.enc \\
            --wrapped-key wrapped_key.json \\
            --private-key your_private_key.pem
          \`\`\`

          **Access grant nanopub:** ${{ steps.wrap.outputs.grant_nanopub_uri || 'pending' }}

          **Terms:** This access is granted under the dataset's [ODRL policy](${{ steps.evaluate.outputs.policy_nanopub_uri }}). Please respect the usage conditions.
          EOF
          )"
          gh issue close ${{ github.event.issue.number }} --reason completed
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment on issue (denied)
        if: steps.evaluate.outputs.decision == 'deny'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<EOF
          ## Access Denied

          Your request was evaluated against the dataset's ODRL policy and could not be approved.

          **Reason:** ${{ steps.evaluate.outputs.reason }}

          If you believe this is an error, please contact the dataset maintainers.
          EOF
          )"
          gh issue close ${{ github.event.issue.number }} --reason "not planned"
        env:
          GH_TOKEN: ${{ github.token }}
