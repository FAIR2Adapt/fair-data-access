<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Quicksand, sans-serif">

  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#f8fafa"/>

  <!-- Phase 1: Data Provider -->
  <rect x="30" y="20" width="260" height="380" rx="10" fill="#1D6886" opacity="0.08" stroke="#1D6886" stroke-width="1.5"/>
  <text x="160" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#1D6886">DATA PROVIDER</text>

  <rect x="50" y="72" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Encrypt data</text>
  <text x="160" y="118" text-anchor="middle" font-size="11" fill="#666">AES-256-GCM</text>

  <!-- Arrow down -->
  <line x1="160" y1="132" x2="160" y2="152" stroke="#1D6886" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="50" y="155" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="160" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Publish ODRL policy</text>
  <text x="160" y="201" text-anchor="middle" font-size="11" fill="#666">as nanopublication</text>

  <!-- Arrow down -->
  <line x1="160" y1="215" x2="160" y2="235" stroke="#1D6886" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="50" y="238" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="160" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Upload encrypted data</text>
  <text x="160" y="284" text-anchor="middle" font-size="11" fill="#666">Zenodo / S3 Pangeo@EOSC</text>

  <rect x="50" y="318" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="160" y="344" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Store dataset key</text>
  <text x="160" y="364" text-anchor="middle" font-size="11" fill="#666">GitHub Secret</text>

  <!-- Arrow down -->
  <line x1="160" y1="298" x2="160" y2="318" stroke="#1D6886" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Phase 2: GitHub Actions -->
  <rect x="320" y="20" width="260" height="380" rx="10" fill="#35C690" opacity="0.08" stroke="#35C690" stroke-width="1.5"/>
  <text x="450" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#1D6886">GITHUB ACTIONS</text>

  <rect x="340" y="72" width="220" height="60" rx="8" fill="white" stroke="#35C690" stroke-width="1.5"/>
  <text x="450" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Researcher opens</text>
  <text x="450" y="118" text-anchor="middle" font-size="11" fill="#666">access request (GitHub Issue)</text>

  <line x1="450" y1="132" x2="450" y2="152" stroke="#35C690" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="340" y="155" width="220" height="60" rx="8" fill="white" stroke="#35C690" stroke-width="1.5"/>
  <text x="450" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Resolve DID + evaluate</text>
  <text x="450" y="201" text-anchor="middle" font-size="11" fill="#666">ODRL policy</text>

  <line x1="450" y1="215" x2="450" y2="235" stroke="#35C690" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="340" y="238" width="220" height="60" rx="8" fill="white" stroke="#35C690" stroke-width="1.5"/>
  <text x="450" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Wrap key for requester</text>
  <text x="450" y="284" text-anchor="middle" font-size="11" fill="#666">with DID public key</text>

  <line x1="450" y1="298" x2="450" y2="318" stroke="#35C690" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <rect x="340" y="318" width="220" height="60" rx="8" fill="white" stroke="#35C690" stroke-width="1.5"/>
  <text x="450" y="344" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Publish access grant</text>
  <text x="450" y="364" text-anchor="middle" font-size="11" fill="#666">nanopub audit trail</text>

  <!-- Phase 3: Data Consumer -->
  <rect x="610" y="20" width="260" height="380" rx="10" fill="#1D6886" opacity="0.08" stroke="#1D6886" stroke-width="1.5"/>
  <text x="740" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#1D6886">DATA CONSUMER</text>

  <rect x="630" y="72" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="740" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Download wrapped key</text>
  <text x="740" y="118" text-anchor="middle" font-size="11" fill="#666">from GitHub Pages</text>

  <line x1="740" y1="132" x2="740" y2="152" stroke="#1D6886" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="630" y="155" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="740" y="181" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Decrypt with</text>
  <text x="740" y="201" text-anchor="middle" font-size="11" fill="#666">DID private key</text>

  <line x1="740" y1="215" x2="740" y2="235" stroke="#1D6886" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="630" y="238" width="220" height="60" rx="8" fill="white" stroke="#1D6886" stroke-width="1.5"/>
  <text x="740" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#32373c">Run analysis</text>
  <text x="740" y="284" text-anchor="middle" font-size="11" fill="#666">urban_pfr pipeline</text>

  <!-- Horizontal arrows between phases -->
  <line x1="290" y1="185" x2="320" y2="185" stroke="#1D6886" stroke-width="2.5" marker-end="url(#arrowBlueBig)"/>
  <line x1="580" y1="185" x2="610" y2="185" stroke="#35C690" stroke-width="2.5" marker-end="url(#arrowGreenBig)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1D6886"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#35C690"/>
    </marker>
    <marker id="arrowBlueBig" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1D6886"/>
    </marker>
    <marker id="arrowGreenBig" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#35C690"/>
    </marker>
  </defs>
</svg>
